# CSRF « stateless » (cookie + en-tête) pour les formulaires Symfony (token_id: submit, compatible Turbo).
# Le login (token « authenticate ») reste sur le gestionnaire session : plus fiable après clone / premier POST.
framework:
    form:
        csrf_protection:
            token_id: submit

    csrf_protection:
        stateless_token_ids:
            - submit
